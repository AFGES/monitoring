global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape vmagent itself
  - job_name: "vmagent"
    static_configs:
      - targets: ["vmagent:8429"]

  # Scrape VictoriaMetrics itself
  - job_name: "victoriametrics"
    static_configs:
      - targets: ["victoriametrics:8428"]

  # Scrape vmalert
  - job_name: "vmalert"
    static_configs:
      - targets: ["vmalert:8880"]

  # Scrape alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # PVE nodes — using Prometheus Node Exporter (port 9100)
  # Replace with your actual PVE node IPs
  - job_name: "pve-nodes"
    static_configs:
      - targets:
          - "192.168.1.10:9100"  # pve-node-1
          # - "192.168.1.11:9100"  # pve-node-2
        labels:
          environment: "pve"

  # PVE metrics via pve_exporter (port 9221) — optional
  # - job_name: "pve-exporter"
  #   static_configs:
  #     - targets:
  #         - "192.168.1.10:9221"
  #   params:
  #     module: [default]
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - target_label: instance
  #       replacement: pve
