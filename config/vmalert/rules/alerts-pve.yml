# VMAlert alerting rules for PVE node monitoring
groups:
  - name: pve-nodes
    interval: 30s
    rules:
      - alert: PVENodeDown
        expr: up{job="pve-nodes"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PVE node {{ $labels.instance }} is down"
          description: "Node exporter at {{ $labels.instance }} has been unreachable for more than 2 minutes."

      - alert: PVENodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{job="pve-nodes", mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on PVE node {{ $labels.instance }}"
          description: "CPU usage on {{ $labels.instance }} has been above 90% for 10 minutes."

      - alert: PVENodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes{job="pve-nodes"} / node_memory_MemTotal_bytes{job="pve-nodes"})) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on PVE node {{ $labels.instance }}"
          description: "Memory usage on {{ $labels.instance }} is above 90%."

      - alert: PVENodeDiskAlmostFull
        expr: (1 - (node_filesystem_avail_bytes{job="pve-nodes", mountpoint="/", fstype!="tmpfs"} / node_filesystem_size_bytes{job="pve-nodes", mountpoint="/", fstype!="tmpfs"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk almost full on PVE node {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.instance }} ({{ $labels.mountpoint }}) is above 85%."
